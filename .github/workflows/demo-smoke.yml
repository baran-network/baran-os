name: demo-smoke

on:
  pull_request:
    paths:
      - "core/runtime/**"
      - "sidecar/**"
      - "protocol/**"
      - "sdk/**"
      - "sdks/**"
      - "ui/**"
      - "examples/hello-baran/**"
      - "deploy/demo/**"
      - "scripts/demo/**"
      - "Makefile"
      - ".github/workflows/demo-smoke.yml"
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run hello-baran smoke test
        run: make demo-smoke
      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-smoke-logs
          path: demo-smoke-logs/
          if-no-files-found: ignore
