<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baran OS - Operator Decisions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        header { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.25rem; font-weight: 600; }
        header h1 span { color: #38bdf8; }
        .status { font-size: 0.75rem; display: flex; align-items: center; gap: 0.5rem; color: #94a3b8; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
        .status-dot.disconnected { background: #ef4444; }
        main { max-width: 960px; margin: 0 auto; padding: 2rem; }
        .empty { text-align: center; padding: 4rem 2rem; color: #64748b; }
        .empty h2 { font-size: 1.125rem; margin-bottom: 0.5rem; }
        .decision-list { display: flex; flex-direction: column; gap: 1rem; }
        .decision-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1.5rem; transition: border-color 0.2s; }
        .decision-card:hover { border-color: #475569; }
        .decision-card.conflict { border-color: #f59e0b; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .card-header h3 { font-size: 1rem; font-weight: 600; color: #f8fafc; }
        .badge { font-size: 0.6875rem; padding: 0.125rem 0.5rem; border-radius: 9999px; font-weight: 500; }
        .badge-pending { background: #1e3a5f; color: #38bdf8; }
        .badge-conflict { background: #451a03; color: #fbbf24; }
        .prompt { background: #0f172a; border-radius: 0.375rem; padding: 1rem; margin-bottom: 1rem; font-size: 0.9375rem; line-height: 1.5; color: #cbd5e1; }
        .meta { display: flex; gap: 1.5rem; font-size: 0.75rem; color: #64748b; margin-bottom: 1rem; flex-wrap: wrap; }
        .meta span { display: flex; align-items: center; gap: 0.25rem; }
        .resources { display: flex; gap: 0.375rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .resource-tag { font-size: 0.6875rem; padding: 0.125rem 0.5rem; background: #1e293b; border: 1px solid #475569; border-radius: 0.25rem; color: #94a3b8; }
        .actions { display: flex; gap: 0.75rem; align-items: flex-end; }
        .actions input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 0.375rem; padding: 0.5rem 0.75rem; color: #e2e8f0; font-size: 0.875rem; }
        .actions input::placeholder { color: #475569; }
        .btn { padding: 0.5rem 1.25rem; border: none; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-approve { background: #16a34a; color: white; }
        .btn-reject { background: #dc2626; color: white; }
        .conflict-info { font-size: 0.75rem; color: #f59e0b; margin-bottom: 0.75rem; padding: 0.5rem 0.75rem; background: rgba(245,158,11,0.1); border-radius: 0.25rem; }
    </style>
</head>
<body>
    <header>
        <h1><span>Baran OS</span> Operator Decisions</h1>
        <div class="status">
            <div class="status-dot" id="sse-status"></div>
            <span id="sse-label">Connecting...</span>
        </div>
    </header>
    <main>
        <div id="decision-list" class="decision-list"></div>
        <div id="empty" class="empty" style="display:none;">
            <h2>No pending decisions</h2>
            <p>Decisions will appear here when workflows require human approval.</p>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
