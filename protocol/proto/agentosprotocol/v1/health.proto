syntax = "proto3";

package agentosprotocol.v1;

option go_package = "github.com/carlosmolina/agent-os/protocol/gen/go/agentosprotocol/v1;protocolv1";

// AgentStatus is the self-reported health status of an agent.
enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_HEALTHY = 1;
  AGENT_STATUS_DEGRADED = 2;
  AGENT_STATUS_OVERLOADED = 3;
}

// ResourceUsage contains optional resource metrics reported in heartbeat pong.
message ResourceUsage {
  double cpu_percent = 1;
  uint64 memory_bytes = 2;
  uint32 pending_events = 3;
}

// HealthPingPayload is the payload for agent.health.ping events.
message HealthPingPayload {
  string agent_id = 1;
  int64 sequence = 2;
}

// HealthPongPayload is the payload for agent.health.pong events.
message HealthPongPayload {
  string agent_id = 1;
  int64 sequence = 2;
  AgentStatus status = 3;
  ResourceUsage resources = 4;
}
